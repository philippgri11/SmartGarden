apiVersion: v1
kind: ConfigMap
metadata:
  name: irrigation-config
  namespace: irrigation
data:
  DATABASE_HOST: postgres.irrigation.svc.cluster.local
  DATABASE_PORT: "5432"
  DATABASE_NAME: irrigation
  DATABASE_USER: postgres
  APP_TIMEZONE: Europe/Berlin
  GPIO_MODE: simulated
  GPIO_ACTIVE_LOW: "true"
  WEATHER_ENABLED: "true"
  WEATHER_FAIL_MODE: allow
  DEFAULT_LATITUDE: "52.52"
  DEFAULT_LONGITUDE: "13.405"
  FRONTEND_ORIGIN: http://frontend.irrigation.local
  REMOTE_GATE_INTERNAL_API_BASE_URL: http://backend.irrigation.svc.cluster.local:8000
  REMOTE_GATE_MAX_MANUAL_DURATION_MINUTES: "10"
  REMOTE_GATE_ALLOW_RUN_ALL: "false"
  CLOUDFLARE_ACCESS_ENFORCE: "true"
  CLOUDFLARE_ACCESS_TEAM_DOMAIN: ""
  CLOUDFLARE_ACCESS_AUDIENCE: ""
  SCHEDULER_POLL_SECONDS: "2"
  SCHEDULER_HEARTBEAT_MAX_AGE_SECONDS: "90"
  WATCHDOG_POLL_SECONDS: "15"
  WATCHDOG_RUN_SAFETY_MARGIN_SECONDS: "90"
  WATCHDOG_ALERT_COOLDOWN_MINUTES: "60"
  WATCHDOG_ALERT_RECIPIENTS: grill.wanzleben@freenet.de,philipp.grill@freenet.de
  SMTP_HOST: mx.freenet.de
  SMTP_PORT: "587"
  SMTP_USE_TLS: "true"
  SMTP_USERNAME: smartgarden-alerts@freenet.de
  SMTP_FROM: smartgarden-alerts@freenet.de
  OPENAI_MODEL: gpt-4.1-mini
