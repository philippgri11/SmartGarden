apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: irrigation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: irrigation-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.entrypoint", "worker"]
          envFrom:
            - configMapRef:
                name: irrigation-config
          env:
            - name: GPIO_MODE
              value: real
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: irrigation-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: gpiochip
              mountPath: /dev/gpiochip0
      volumes:
        - name: gpiochip
          hostPath:
            path: /dev/gpiochip0
            type: CharDevice
