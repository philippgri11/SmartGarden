name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run backend tests
        run: pytest backend/tests

  frontend:
    name: Frontend build and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test:unit

  images:
    name: Build and publish ARM64 images
    runs-on: ubuntu-24.04-arm
    needs:
      - backend
      - frontend
    if: github.event_name != 'pull_request'
    env:
      BACKEND_IMAGE: ghcr.io/philippgri11/smartgarden-backend
      FRONTEND_IMAGE: ghcr.io/philippgri11/smartgarden-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/arm64
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          platforms: linux/arm64
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  cloudflare-frontend:
    name: Deploy remote frontend to Cloudflare
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Configure remote API endpoint
        working-directory: frontend
        run: |
          cat > dist/irrigation-control-frontend/browser/runtime-config.js <<EOF
          window.__SMARTGARDEN_CONFIG__ = {
            apiBaseUrl: "/api"
          };
          EOF
          cat > dist/irrigation-control-frontend/browser/_headers <<EOF
          /runtime-config.js
            Cache-Control: no-store, no-cache, must-revalidate, max-age=0
          EOF

      - name: Deploy remote frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: 2a5471c1e77450b4c4e7dcae0ced96df
          workingDirectory: frontend
          command: pages deploy dist/irrigation-control-frontend/browser --project-name smartgarden-remote-ui --branch main
